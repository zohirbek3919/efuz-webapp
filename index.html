<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EfuzOnlyShop | Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a1a;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ===== TOP BUTTONS ===== */
        .top-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 0;
        }

        .top-btn {
            padding: 18px 12px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: #fff;
            line-height: 1.3;
            transition: opacity 0.15s, transform 0.15s;
        }

        .top-btn:active {
            opacity: 0.85;
            transform: scale(0.97);
        }

        .btn-uzcard {
            background: linear-gradient(135deg, #4f8ef7 0%, #7b5ef8 100%);
        }

        .btn-humo {
            background: linear-gradient(135deg, #e96cf0 0%, #b94ef0 100%);
        }

        /* ===== CARD SECTION ===== */
        .card-section {
            background: #2a2a2a;
            border-radius: 20px;
            padding: 24px 20px;
            margin-top: 16px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
        }

        /* Single card block */
        .card-block {
            background: #1a1a1a;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 14px;
        }

        .card-number {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            text-align: center;
            color: #fff;
            margin-bottom: 14px;
            font-family: 'Courier New', monospace;
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .card-info-row {
            font-size: 14px;
            color: #ccc;
            text-align: center;
        }

        .card-info-row b {
            color: #fff;
        }

        .copy-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #7b5ef8, #b94ef0);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.15s, transform 0.15s;
        }

        .copy-btn:active {
            opacity: 0.85;
            transform: scale(0.97);
        }

        .copy-btn.copied {
            background: #3a3a3a;
        }

        /* ===== AMOUNT ===== */
        .amount-section {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .amount-text {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
        }

        .amount-icon {
            font-size: 26px;
            margin-right: 6px;
        }

        /* ===== TIMER ===== */
        .timer-section {
            text-align: center;
            margin-top: 6px;
            margin-bottom: 6px;
        }

        .timer {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: 6px;
            color: #fff;
            font-family: 'Courier New', monospace;
        }

        .timer.danger {
            color: #ef4444;
        }

        .timer-hint {
            font-size: 13px;
            color: #888;
            margin-top: 6px;
        }

        /* ===== DONE BUTTON ===== */
        .done-btn {
            width: 100%;
            padding: 16px;
            background: #2a2a2a;
            border: 1.5px solid #3a3a3a;
            border-radius: 14px;
            color: #ccc;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: background 0.15s;
        }

        .done-btn:active {
            background: #333;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- TOP BUTTONS -->
    <div class="top-buttons">
        <button class="top-btn btn-uzcard" onclick="switchCard(0)">
            Uzcardga<br>yuborish
        </button>
        <button class="top-btn btn-humo" onclick="switchCard(1)">
            Humoga<br>yuborish
        </button>
    </div>

    <!-- CARD SECTION -->
    <div class="card-section">
        <div class="card-title">💳 Kartaga to'lov</div>

        <div class="card-block">
            <div class="card-number" id="cardNumber">0000 0000 0000 0000</div>
            <div class="card-info">
                <div class="card-info-row">🏦 Bank: <b id="bankName">-</b></div>
                <div class="card-info-row">📞 Ulangan raqam: <b id="cardPhone">-</b></div>
                <div class="card-info-row">👤 Egasi: <b id="cardHolder">-</b></div>
            </div>
            <button class="copy-btn" id="copyBtn" onclick="copyCard()">
                📋 Nusxalash
            </button>
        </div>

        <!-- AMOUNT -->
        <div class="amount-section">
            <span class="amount-text"><span class="amount-icon">💵</span>Miqdor: <span id="amountText">5 000</span> so'm</span>
        </div>

        <!-- TIMER -->
        <div class="timer-section">
            <div class="timer" id="timer">05:00</div>
            <div class="timer-hint">⏳ O'tkazma 5 daqiqa ichida amalga oshirilmasa tasdiqlanmaydi</div>
        </div>
    </div>

    <!-- DONE BUTTON -->
    <button class="done-btn" onclick="donePay()">
        To'lovni amalga oshirdim ✅
    </button>

</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // URL parametrlardan ma'lumot olish
    const urlParams = new URLSearchParams(window.location.search);
    const rawData = urlParams.get('data') || '';
    const parts = rawData.split('|');

    const summa      = parts[0] || '5000';
    const karta1Raqam  = (parts[1] || '4073420084081367').replace(/\s/g, '');
    const karta1Egasi  = decodeURIComponent(parts[2] || 'MAXAMMADALIYEV ZOXIRBEK');
    const karta1Bank   = decodeURIComponent(parts[3] || 'Agro Bank');
    const karta1Telefon = decodeURIComponent(parts[4] || '+998888570067');
    const tolovId    = parts[5] || '0';

    // 1-karta — Uzcard (statik)
    const karta2Raqam   = '5614681018172167';
    const karta2Egasi   = 'UCH MAXAMMADALIYEV ZOHIRBEK';
    const karta2Bank    = 'Universal Bank';
    const karta2Telefon = '+998905093919';

    const cards = [
        { raqam: karta2Raqam, egasi: karta2Egasi, bank: karta2Bank, telefon: karta2Telefon },  // Uzcard
        { raqam: karta1Raqam, egasi: karta1Egasi, bank: karta1Bank, telefon: karta1Telefon },  // Humo
    ];

    let currentCard = 0;

    function formatCardNumber(num) {
        return num.replace(/\s/g, '').replace(/(.{4})/g, '$1 ').trim();
    }

    function renderCard(index) {
        const c = cards[index];
        document.getElementById('cardNumber').textContent = formatCardNumber(c.raqam);
        document.getElementById('bankName').textContent   = c.bank;
        document.getElementById('cardPhone').textContent  = c.telefon;
        document.getElementById('cardHolder').textContent = c.egasi;
        currentCard = index;

        // Reset copy button
        const btn = document.getElementById('copyBtn');
        btn.textContent = '📋 Nusxalash';
        btn.classList.remove('copied');
    }

    function switchCard(index) {
        renderCard(index);
    }

    // Amount
    document.getElementById('amountText').textContent =
        parseInt(summa).toLocaleString('ru-RU');

    // Initial render
    renderCard(0);

    // ===== COPY =====
    function copyCard() {
        const num = cards[currentCard].raqam.replace(/\s/g, '');
        const btn = document.getElementById('copyBtn');

        const doCopy = () => {
            btn.textContent = '✅ Nusxalandi!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '📋 Nusxalash';
                btn.classList.remove('copied');
            }, 2000);
        };

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(num).then(doCopy).catch(() => {
                fallbackCopy(num);
                doCopy();
            });
        } else {
            fallbackCopy(num);
            doCopy();
        }
    }

    function fallbackCopy(text) {
        const el = document.createElement('textarea');
        el.value = text;
        el.style.position = 'fixed';
        el.style.opacity = '0';
        document.body.appendChild(el);
        el.focus();
        el.select();
        try { document.execCommand('copy'); } catch(e) {}
        document.body.removeChild(el);
    }

    // ===== TIMER =====
    let timeLeft = 5 * 60;
    const timerEl = document.getElementById('timer');

    const timerInterval = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        timerEl.textContent = `${m}:${s}`;
        if (timeLeft <= 60) timerEl.classList.add('danger');
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timerEl.textContent = '00:00';
        }
    }, 1000);

    // ===== TO'LOV QILDIM =====
    function donePay() {
        tg.sendData(JSON.stringify({ action: 'tolov_qilindi', summa: summa, tolov_id: tolovId }));
    }
</script>
</body>
</html>
